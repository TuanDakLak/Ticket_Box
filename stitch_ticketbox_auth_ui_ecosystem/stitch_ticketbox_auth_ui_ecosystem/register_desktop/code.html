<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Shell (Suppressed Nav for Transactional focus) -->
<header class="docked full-width top-0 bg-surface border-b border-outline-variant shadow-sm z-50">
<div class="flex justify-between items-center w-full px-margin-desktop h-16 max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-headline-md text-headline-md font-bold text-primary">TicketBox</span>
</div>
<div class="hidden md:flex items-center gap-sm">
<span class="font-body-sm text-body-sm text-on-surface-variant">Already have an account?</span>
<a class="font-label-md text-label-md text-primary font-bold hover:underline transition-all" href="#">Sign in</a>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center py-2xl px-margin-mobile md:px-margin-desktop relative">
<!-- Abstract Background Pattern -->
<div class="absolute inset-0 overflow-hidden pointer-events-none opacity-40">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-primary-fixed blur-3xl"></div>
<div class="absolute bottom-[0%] right-[0%] w-[30%] h-[30%] rounded-full bg-secondary-fixed blur-3xl"></div>
</div>
<!-- Centered Register Form Card -->
<div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant rounded-xl p-xl form-shadow z-10">
<div class="mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Join TicketBox</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create an account to start booking concerts</p>
</div>
<form class="space-y-lg" id="registerForm">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="full_name">Full Name</label>
<input class="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="full_name" name="full_name" placeholder="Enter your full name" required="" type="text"/>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="Min. 8 characters" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<!-- Strength Meter -->
<div class="pt-base">
<div class="flex gap-1 h-1 w-full mb-xs">
<div class="flex-1 bg-outline-variant rounded-full transition-colors" id="strength-1"></div>
<div class="flex-1 bg-outline-variant rounded-full transition-colors" id="strength-2"></div>
<div class="flex-1 bg-outline-variant rounded-full transition-colors" id="strength-3"></div>
<div class="flex-1 bg-outline-variant rounded-full transition-colors" id="strength-4"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant" id="strength-text">Password strength</span>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="confirm_password">Confirm Password</label>
<input class="w-full h-[44px] px-md rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-outline-variant" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required="" type="password"/>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-sm py-xs">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded-sm border-outline border-2 text-primary focus:ring-primary" id="terms" required="" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                    </label>

<button class="w-full h-[44px] bg-primary-container text-on-primary font-label-md text-label-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Create account

<div class="h-[1px] flex-grow bg-outline-variant"></div>

<div class="h-[1px] flex-grow bg-outline-variant"></div>

                    Google
                </button>
<button class="h-[44px] border border-outline-variant rounded-lg flex items-center justify-center gap-sm font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[#1877F2]">social_leaderboard</span>
                    Facebook
                </button>
</div>
</div>
</main>
<!-- Footer Shell -->
<footer class="bg-surface-container-lowest border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center w-full py-8 px-margin-desktop max-w-7xl mx-auto gap-4">
<div class="flex items-center gap-1">
<span class="font-headline-sm text-headline-sm font-bold text-on-surface">TicketBox</span>
<span class="font-body-sm text-body-sm text-on-surface-variant ml-2">© 2024 TicketBox Security. All rights reserved.</span>
</div>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary underline transition-all" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary underline transition-all" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary underline transition-all" href="#">Security Center</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary underline transition-all" href="#">Support</a>
</div>
</div>
</footer>
<script>
        // Password strength meter micro-interaction
        const passwordInput = document.getElementById('password');
        const bars = [
            document.getElementById('strength-1'),
            document.getElementById('strength-2'),
            document.getElementById('strength-3'),
            document.getElementById('strength-4')
        ];
        const strengthText = document.getElementById('strength-text');

        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let score = 0;
            
            if (val.length > 5) score++;
            if (val.length > 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val) || /[^A-Za-z0-9]/.test(val)) score++;

            // Reset bars
            bars.forEach(bar => bar.className = 'flex-1 bg-outline-variant rounded-full transition-colors');

            if (val.length === 0) {
                strengthText.textContent = "Password strength";
                strengthText.className = "font-label-sm text-label-sm text-on-surface-variant";
                return;
            }

            const colors = ['bg-error', 'bg-secondary', 'bg-primary-container', 'bg-primary'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];

            for (let i = 0; i < score; i++) {
                bars[i].classList.remove('bg-outline-variant');
                bars[i].classList.add(colors[score - 1]);
            }

            strengthText.textContent = labels[score - 1];
            strengthText.className = `font-label-sm text-label-sm text-${colors[score-1].split('-')[1] === 'container' ? 'primary' : colors[score-1].split('-')[1]}`;
        });

        // Form submission animation
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Creating...';
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                alert('Account registration initiated! Please check your email for verification.');
                btn.innerHTML = 'Create account <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
                btn.classList.remove('opacity-80');
            }, 1500);
        });
    </script>
</body></html>
