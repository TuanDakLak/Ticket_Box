<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .strength-bar {
            height: 4px;
            transition: all 0.3s ease;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#dbe1ff",
                        "inverse-on-surface": "#eff0fd",
                        "on-secondary-fixed-variant": "#862208",
                        "tertiary-fixed-dim": "#ffb59d",
                        "surface-dim": "#d8d9e6",
                        "surface-container-high": "#e7e7f4",
                        "on-secondary": "#ffffff",
                        "on-background": "#191b24",
                        "on-tertiary-container": "#fff1ed",
                        "on-primary-fixed": "#00174c",
                        "surface-variant": "#e1e1ee",
                        "primary-container": "#0f62fe",
                        "on-error-container": "#93000a",
                        "surface-tint": "#0052dd",
                        "on-primary-fixed-variant": "#003da9",
                        "on-error": "#ffffff",
                        "surface": "#faf8ff",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#ffb4a2",
                        "on-primary-container": "#f3f3ff",
                        "surface-bright": "#faf8ff",
                        "background": "#faf8ff",
                        "on-secondary-fixed": "#3c0700",
                        "on-surface-variant": "#424656",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-surface": "#2e303a",
                        "primary": "#004ccd",
                        "outline-variant": "#c3c6d8",
                        "on-tertiary-fixed-variant": "#832700",
                        "tertiary": "#9e3100",
                        "surface-container-low": "#f2f3ff",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e1e1ee",
                        "on-tertiary-fixed": "#390c00",
                        "error-container": "#ffdad6",
                        "on-surface": "#191b24",
                        "secondary-fixed": "#ffdad2",
                        "secondary": "#a7391e",
                        "tertiary-container": "#c84000",
                        "secondary-container": "#fd7958",
                        "outline": "#737687",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdbd0",
                        "surface-container": "#ecedfa",
                        "on-secondary-container": "#6e1500"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "margin-mobile": "16px",
                        "3xl": "64px",
                        "base": "4px",
                        "2xl": "48px",
                        "lg": "24px",
                        "sm": "8px",
                        "xs": "4px",
                        "margin-desktop": "24px",
                        "xl": "32px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation -->
<nav class="docked full-width top-0 bg-surface border-b border-outline-variant shadow-sm z-50">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="shield_lock">shield_lock</span>
<span class="font-headline-md text-headline-md font-bold text-primary">TicketBox</span>
</div>
<div class="flex gap-6 items-center">
<a class="font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 px-3 py-2 rounded-lg" href="#">Support</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 px-3 py-2 rounded-lg" href="#">Security Center</a>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-xl">
<div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0_1px_2px_0_rgba(0,0,0,0.05)] p-lg md:p-xl animate-in fade-in slide-in-from-bottom-4 duration-500">
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Create new password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter a new password below to secure your account.</p>
</div>
<form class="space-y-lg" id="resetForm">
<!-- New Password Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="password">New Password</label>
<div class="relative">
<input class="w-full h-[44px] px-md rounded-lg border border-outline outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:border-primary transition-all bg-surface-container-lowest text-body-md" id="password" name="password" placeholder="Enter new password" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Strength Meter -->
<div class="space-y-xs pt-1">
<div class="flex gap-1 h-1">
<div class="strength-bar flex-1 bg-surface-container-high rounded-full" id="strength-1"></div>
<div class="strength-bar flex-1 bg-surface-container-high rounded-full" id="strength-2"></div>
<div class="strength-bar flex-1 bg-surface-container-high rounded-full" id="strength-3"></div>
<div class="strength-bar flex-1 bg-surface-container-high rounded-full" id="strength-4"></div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant" id="strength-text">Password strength</p>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="confirm_password">Confirm Password</label>
<div class="relative">
<input class="w-full h-[44px] px-md rounded-lg border border-outline outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:border-primary transition-all bg-surface-container-lowest text-body-md" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant" onclick="togglePassword('confirm_password')" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full h-[44px] bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary/90 active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                        Reset password
                    </button>
</div>
</form>
<div class="mt-xl pt-xl border-t border-outline-variant text-center">
<a class="inline-flex items-center gap-2 font-label-md text-label-md text-primary hover:underline transition-all" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                    Back to sign in
                </a>
</div>
</div>
</main>
<!-- Footer -->
<footer class="full-width bottom bg-surface-container-lowest border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center w-full py-8 px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto gap-4">
<div class="flex items-center gap-2">
<span class="font-headline-sm text-headline-sm font-bold text-on-surface">TicketBox</span>
<span class="font-label-sm text-label-sm text-on-surface-variant ml-2">© 2024 TicketBox Security. All rights reserved.</span>
</div>
<div class="flex gap-gutter">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-all" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-all" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-all" href="#">Support</a>
</div>
</div>
</footer>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        const passwordInput = document.getElementById('password');
        const strengthBars = [
            document.getElementById('strength-1'),
            document.getElementById('strength-2'),
            document.getElementById('strength-3'),
            document.getElementById('strength-4')
        ];
        const strengthText = document.getElementById('strength-text');

        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;
            
            if (val.length > 5) strength++;
            if (val.length > 8 && /[A-Z]/.test(val)) strength++;
            if (val.length > 10 && /[0-9]/.test(val)) strength++;
            if (val.length > 12 && /[^A-Za-z0-9]/.test(val)) strength++;

            strengthBars.forEach((bar, i) => {
                bar.className = 'strength-bar flex-1 rounded-full ' + (i < strength ? getStrengthColor(strength) : 'bg-surface-container-high');
            });

            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            strengthText.textContent = val.length > 0 ? `Password strength: ${labels[strength - 1] || 'Weak'}` : 'Password strength';
            strengthText.className = `font-label-sm text-label-sm ${getStrengthTextColor(strength)}`;
        });

        function getStrengthColor(strength) {
            if (strength === 1) return 'bg-error';
            if (strength === 2) return 'bg-secondary';
            if (strength === 3) return 'bg-primary';
            return 'bg-primary-container';
        }

        function getStrengthTextColor(strength) {
            if (strength === 1) return 'text-error';
            if (strength === 2) return 'text-secondary';
            if (strength === 3) return 'text-primary';
            if (strength === 4) return 'text-primary-container';
            return 'text-on-surface-variant';
        }

        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Transactional mock feedback
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Updating...';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check">check</span> Password Reset!';
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
            }, 1500);
        });
    </script>
</body></html>
