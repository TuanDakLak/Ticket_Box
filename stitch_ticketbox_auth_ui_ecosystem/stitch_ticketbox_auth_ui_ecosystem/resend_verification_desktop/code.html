<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-background border-b border-outline-variant dark:border-outline shadow-sm dark:shadow-none fixed top-0 left-0 right-0 z-50">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop h-16 max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">TicketBox</span>
</div>
<div class="hidden md:flex gap-lg">
<nav class="flex gap-md">
<!-- Navigation hidden for transactional flow as per Shell Visibility Rule -->
</nav>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-24 pb-12 px-margin-mobile">
<!-- Focused Journey: Centered Form Container (480px width as per style guidance) -->
<div class="w-full max-w-[480px]">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-xl form-card">
<!-- Icon/Header Section -->
<div class="flex flex-col items-center text-center mb-xl">
<div class="w-16 h-16 bg-primary-fixed rounded-full flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-primary text-[32px]">mark_email_unread</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Didn't receive the email?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email address and we'll send you a verification link</p>
</div>
<!-- Form Section -->
<form class="space-y-lg" id="resendForm">
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-11 px-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<button class="w-full h-11 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
<span>Resend verification</span>
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</form>
<!-- Navigation Back Link -->
<div class="mt-xl text-center">
<a class="inline-flex items-center gap-xs font-label-md text-label-md text-primary hover:underline transition-all" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                        Back to sign in
                    </a>
</div>
</div>
<!-- Visual Decorative Element (Abstract Security Patterns) -->
<div class="mt-lg grid grid-cols-3 gap-md opacity-20">
<div class="h-1 bg-outline-variant rounded-full"></div>
<div class="h-1 bg-primary rounded-full"></div>
<div class="h-1 bg-outline-variant rounded-full"></div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-lowest dark:bg-surface-dim border-t border-outline-variant mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center w-full py-8 px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto gap-4">
<div class="flex flex-col items-center md:items-start gap-1">
<span class="font-headline-sm text-headline-sm font-bold text-on-surface dark:text-surface-bright">TicketBox</span>
<p class="font-body-sm text-body-sm text-on-surface-variant">© 2024 TicketBox Security. All rights reserved.</p>
</div>
<div class="flex flex-wrap justify-center gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed underline transition-all" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed underline transition-all" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed underline transition-all" href="#">Security Center</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary dark:hover:text-primary-fixed underline transition-all" href="#">Support</a>
</div>
</div>
</footer>
<!-- Background Illustration (Non-distracting, high-end look) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none select-none">
<div class="absolute -top-[10%] -right-[5%] w-[40%] h-[60%] rounded-full bg-primary-fixed/20 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[30%] h-[50%] rounded-full bg-tertiary-fixed/10 blur-[100px]"></div>
</div>
<script>
        // Micro-interaction for form submission
        document.getElementById('resendForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Loading State
            btn.disabled = true;
            btn.innerHTML = `
                <span class="material-symbols-outlined animate-spin">sync</span>
                <span>Sending...</span>
            `;

            // Simulate API Call
            setTimeout(() => {
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Link Sent!</span>
                `;
                
                // Reset after 3 seconds
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                    btn.innerHTML = originalContent;
                }, 3000);
            }, 1500);
        });

        // Simple parallax effect for background glows
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const glows = document.querySelectorAll('.fixed > div');
            glows[0].style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            glows[1].style.transform = `translate(${-x * 30}px, ${-y * 30}px)`;
        });
    </script>
</body></html>
