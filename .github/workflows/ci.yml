name: CI

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'apps/backend-api/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'eslint.config.mjs'
  push:
    branches:
      - '**'
    paths:
      - 'apps/backend-api/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'eslint.config.mjs'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    timeout-minutes: 12

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm and Prisma engine
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/prisma
          key: ${{ runner.os }}-npm-prisma-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-prisma-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Lint sources
        run: npm run lint

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Type check backend
        run: npm run typecheck:api

      - name: Run backend unit tests
        run: npm run test:api:unit

      - name: Build backend
        run: npm run build:api

  database:
    name: Database Gate
    runs-on: ubuntu-latest

    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketbox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm and Prisma engine
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/prisma
          key: ${{ runner.os }}-npm-prisma-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-prisma-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Apply Prisma migrations
        run: npm run db:migrate:deploy
