name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Type check backend
        run: npm run typecheck:api

      - name: Build backend
        run: npm run build

  database:
    name: Database Gate
    runs-on: ubuntu-latest

    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ticketbox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/ticketbox

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Apply Prisma migrations
        run: npm run db:migrate:deploy

      - name: Seed database
        run: npm run db:seed
