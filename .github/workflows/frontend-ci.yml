name: Frontend CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "apps/web-app/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - "**"
    paths:
      - "apps/web-app/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --fund=false

      - name: Code style verification (Prettier)
        working-directory: apps/web-app
        run: npx prettier --check .

      - name: Static linter audits (ESLint)
        working-directory: apps/web-app
        run: npm run lint

      - name: Static compiler type-checking (TypeScript)
        working-directory: apps/web-app
        run: npm run type-check

      - name: Production compilation build test
        working-directory: apps/web-app
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    steps:
      - name: Trigger CD Webhook for Staging
        run: |
          if [ -n "${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
                 -d "{\"branch\":\"${{ github.ref_name }}\",\"sha\":\"${{ github.sha }}\"}" \
                 ${{ secrets.STAGING_DEPLOY_WEBHOOK_URL }}
            echo "Successfully triggered staging webhook"
          else
            echo "STAGING_DEPLOY_WEBHOOK_URL is not configured. Skipping deployment."
          fi
