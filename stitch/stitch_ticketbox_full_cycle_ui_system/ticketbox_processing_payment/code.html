<style>

            0% {
                transform: scale(0.8);

            }
            70% {
                transform: scale(1);
                opacity: 0;

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center font-body-md relative overflow-hidden">
<!-- Background atmospheric effect -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-20" style="background: radial-gradient(circle at 50% 50%, #eaddff 0%, transparent 60%);"></div>
<main class="z-10 flex flex-col items-center max-w-md w-full px-margin-mobile text-center">
<!-- Logo -->
<div class="mb-12">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary italic font-black tracking-tighter">TicketBox</h1>
</div>
<!-- Central Loading Visualization -->
<div class="relative w-48 h-48 mb-8 flex items-center justify-center">
<!-- Pulsing outer ring -->
<div class="absolute inset-0 rounded-full border-2 border-primary pulse-ring opacity-50"></div>
<div class="absolute inset-4 rounded-full border border-secondary-fixed pulse-ring" style="animation-delay: 0.5s;"></div>
<!-- Core center -->
<div class="relative w-24 h-24 bg-surface-container-lowest rounded-full shadow-[0px_4px_20px_rgba(15,23,42,0.08)] flex items-center justify-center z-10 border border-outline-variant">
<span class="material-symbols-outlined text-primary text-4xl animate-spin" style="animation-duration: 3s; font-variation-settings: 'wght' 300;">sync</span>
</div>
<!-- Orbiting elements to simulate data processing -->
<div class="absolute inset-0 animate-spin" style="animation-duration: 4s;">
<div class="absolute top-0 left-1/2 -ml-1.5 w-3 h-3 bg-secondary rounded-full shadow-[0_0_10px_rgba(113,42,226,0.8)]"></div>
</div>
<div class="absolute inset-4 animate-spin" style="animation-duration: 6s; animation-direction: reverse;">
<div class="absolute bottom-0 right-1/2 -mr-1 w-2 h-2 bg-primary rounded-full"></div>
</div>
</div>
<!-- Status Messaging -->
<div class="space-y-4">
<h2 class="font-headline-md text-headline-md text-on-surface">Processing your payment securely...</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">Please do not refresh the page or hit the back button. We are confirming your tickets.</p>
</div>
<!-- Progress Indicator (Shimmer style per style guidance) -->
<div class="w-full h-2 mt-12 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-full bg-primary shimmer-bg" style="background: linear-gradient(90deg, #3525cd 25%, #712ae2 50%, #3525cd 75%); background-size: 200% 100%;"></div>
</div>
<!-- Secure Badge -->
<div class="mt-8 flex items-center justify-center gap-2 text-outline font-label-sm text-label-sm">
<span class="material-symbols-outlined" style="font-size: 16px;">lock</span>
<span>256-bit Encrypted Transaction</span>
</div>
</main>
<script>
        // Simulated loading sequence purely for visual feedback
        document.addEventListener('DOMContentLoaded', () => {
            const messages = [
                "Processing your payment securely...",
                "Authorizing card details...",
                "Securing your seats...",
                "Almost there..."
            ];
            const messageEl = document.querySelector('h2');
            let i = 0;
            
            setInterval(() => {
                i = (i + 1) % messages.length;
                messageEl.style.opacity = 0;
                setTimeout(() => {
                    messageEl.textContent = messages[i];
                    messageEl.style.opacity = 1;
                }, 300);
            }, 4000);
            
            messageEl.style.transition = 'opacity 0.3s ease-in-out';
        });
    </script>
