<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TicketBox - Ticket Checker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Montserrat:wght@600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e2dfff",
                        "background": "#f7f9fb",
                        "primary-container": "#4f46e5",
                        "inverse-on-surface": "#eff1f3",
                        "outline-variant": "#c7c4d8",
                        "secondary": "#712ae2",
                        "surface-tint": "#4d44e3",
                        "surface-dim": "#d8dadc",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f2f4f6",
                        "surface": "#f7f9fb",
                        "primary": "#3525cd",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e0e3e5",
                        "surface-container-highest": "#e0e3e5",
                        "tertiary-fixed": "#dae2fd",
                        "surface-container": "#eceef0",
                        "outline": "#777587",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#bec6e0",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "primary-fixed-dim": "#c3c0ff",
                        "secondary-fixed-dim": "#d2bbff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#8a4cfc",
                        "on-secondary-fixed": "#25005a",
                        "on-error": "#ffffff",
                        "on-background": "#191c1e",
                        "on-surface": "#191c1e",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "on-primary-container": "#dad7ff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#586076",
                        "inverse-primary": "#c3c0ff",
                        "on-surface-variant": "#464555",
                        "tertiary": "#41485e",
                        "secondary-fixed": "#eaddff",
                        "surface-bright": "#f7f9fb",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#0f0069",
                        "inverse-surface": "#2d3133",
                        "on-tertiary-container": "#d4dbf5",
                        "on-tertiary-fixed": "#131b2e",
                        "on-secondary-container": "#fffbff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-max": "1280px",
                        "margin-desktop": "40px",
                        "margin-mobile": "16px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "display-lg-mobile": ["Montserrat"],
                        "display-lg": ["Montserrat"],
                        "headline-md": ["Montserrat"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .scanner-frame {
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
        }
        .scan-line {
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
    </style>
</head>
<body class="bg-surface text-on-surface h-screen w-screen flex items-center justify-center overflow-hidden font-body-md">
<!-- Mobile Device Frame for Desktop Visualization -->
<div class="relative w-full max-w-[414px] h-full max-h-[896px] bg-black sm:rounded-[3rem] sm:border-[14px] border-surface-container-high shadow-2xl overflow-hidden flex flex-col">
<!-- Camera View Area (Background) -->
<div class="absolute inset-0 z-0 bg-inverse-surface flex items-center justify-center">
<img alt="Crowd at a concert with vibrant stage lights" class="w-full h-full object-cover opacity-60" data-alt="A blurred perspective from a smartphone camera pointed at a person holding a physical concert ticket in front of a slightly out-of-focus crowd at a music festival. The lighting is dynamic with neon purples and blues from a distant stage. The scene represents a live scanning environment, highly realistic, capturing a fast-paced energetic mood characteristic of high-traffic live events." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBo6KhqMJB83vduKF2IPhKGtkFe4KMad176emtImBUBhqI_aUxYhrKMliMIKw84zjcugHpwjmOKHff2d5NdgGKcV_vjjsbwYQGCz29TdSupJZc1uMJ0bLiy7iLW0z78LczuPJiNDVhqo--eVzBr7gVBHpn_pBXq-dZjMvVpqYyJjaPZ6sabVDYPmmUObXWYcc6CrjUDb3kbYgsqXWpz8Z3nt3N7MOtIMqjBBh5XLQWQVYr2WeEJp-1KGa6r1qriIW_VepdXjrMowTz7"/>
</div>
<!-- Offline Status Banner -->
<div class="absolute top-0 left-0 w-full z-20 pt-12 pb-3 px-4 bg-amber-500/90 backdrop-blur-sm shadow-md flex justify-between items-center text-white">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="cloud_off" style="font-variation-settings: 'FILL' 1;">cloud_off</span>
<div>
<div class="font-label-sm text-label-sm uppercase tracking-wider">Offline Mode</div>
<div class="text-[10px] font-medium opacity-90">12 scans pending sync</div>
</div>
</div>
<button class="bg-white/20 hover:bg-white/30 rounded-full p-1.5 transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="sync">sync</span>
</button>
</div>
<!-- Scanner Reticle -->
<div class="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none mt-10">
<div class="text-white font-label-sm text-label-sm mb-6 bg-black/50 px-4 py-2 rounded-full backdrop-blur-md">
                Align QR Code within frame
            </div>
<div class="relative w-64 h-64">
<!-- Outer shading (implemented via box-shadow hack on a pseudo element or extra div in actual practice, here simulating with borders for simplicity if full screen wasn't needed, but using a mask is better. We'll use corner brackets) -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary-fixed rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary-fixed rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary-fixed rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary-fixed rounded-br-lg"></div>
<!-- Scanning Laser Line -->
<div class="absolute left-0 right-0 h-0.5 bg-primary-fixed shadow-[0_0_8px_2px_rgba(226,223,255,0.8)] scan-line z-20"></div>
</div>
</div>
<!-- Scan Result Overlay (Success State - currently hidden, toggle class 'hidden' to test) -->
<div class="absolute inset-x-4 bottom-28 z-30 bg-surface rounded-xl shadow-2xl p-5 border-l-4 border-green-500 transform transition-all duration-300 hidden">
<div class="flex items-start gap-4">
<div class="bg-green-100 rounded-full p-2 flex-shrink-0">
<span class="material-symbols-outlined text-green-600 text-3xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-green-700">VALID TICKET</h3>
<div class="mt-2 space-y-1">
<div class="flex justify-between items-center border-b border-surface-variant pb-1">
<span class="font-label-sm text-label-sm text-on-surface-variant">Name</span>
<span class="font-body-md text-body-md font-medium text-on-surface">Alex Rivera</span>
</div>
<div class="flex justify-between items-center border-b border-surface-variant pb-1">
<span class="font-label-sm text-label-sm text-on-surface-variant">Section</span>
<span class="font-body-md text-body-md font-bold text-primary">SVIP - Row 4</span>
</div>
<div class="flex justify-between items-center pt-1">
<span class="font-label-sm text-label-sm text-on-surface-variant">Ticket ID</span>
<span class="font-body-md text-sm text-on-surface opacity-70">#TK-88942-XL</span>
</div>
</div>
</div>
</div>
</div>
<!-- Scan Result Overlay (Error State - currently visible for demo) -->
<div class="absolute inset-x-4 bottom-28 z-30 bg-error-container rounded-xl shadow-[0px_8px_30px_rgba(186,26,26,0.2)] p-5 border-l-4 border-error transform transition-all duration-300">
<div class="flex items-start gap-4">
<div class="bg-error/20 rounded-full p-2 flex-shrink-0">
<span class="material-symbols-outlined text-error text-3xl" data-icon="cancel" style="font-variation-settings: 'FILL' 1;">cancel</span>
</div>
<div class="flex-1">
<h3 class="font-headline-md text-headline-md text-on-error-container">ALREADY CHECKED IN</h3>
<p class="font-body-md text-sm text-on-error-container/80 mt-1">This ticket was scanned at Gate B 45 minutes ago.</p>
<button class="mt-4 w-full bg-error text-on-error font-label-sm text-label-sm py-2 rounded-lg active:scale-95 transition-transform">
                        Override (Admin Only)
                    </button>
</div>
</div>
</div>
<!-- BottomNavBar (Shared Component styling logic applied) -->
<nav class="fixed sm:absolute bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-4 bg-surface dark:bg-inverse-surface rounded-t-xl shadow-[0px_-4px_20px_rgba(15,23,42,0.08)]">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-low active:bg-surface-container-low transition-colors duration-200 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-label-sm text-[10px]">History</span>
</button>
<!-- Active Navigation Tab -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold p-2 rounded-lg w-16 scale-110 -translate-y-2 bg-surface shadow-md border border-surface-variant">
<div class="bg-primary-container text-on-primary-container p-3 rounded-full mb-1">
<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<span class="font-label-sm text-[10px] hidden">Scanner</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-low active:bg-surface-container-low transition-colors duration-200 p-2 rounded-lg w-16">
<span class="material-symbols-outlined mb-1" data-icon="search">search</span>
<span class="font-label-sm text-[10px]">Lookup</span>
</button>
</nav>
</div>
</body></html>
