<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <style>
    .zone {
      cursor: pointer;
      transition: fill 0.2s ease, opacity 0.2s ease;
      stroke: #ffffff;
      stroke-width: 2;
    }
    .zone:hover {
      opacity: 0.8;
      stroke: #00ff00;
      stroke-width: 3;
    }
  </style>

  <rect x="250" y="20" width="300" height="40" fill="#333333" rx="5" />
  <text x="400" y="45" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">STAGE</text>

  <rect id="zone-svip-01" class="zone" x="250" y="90" width="300" height="80" fill="#ff007f" rx="8" />
  <text x="400" y="135" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" pointer-events="none">SUPER VIP (SVIP)</text>

  <polygon id="zone-vip-left" class="zone" points="80,190 230,190 230,290 120,290" fill="#ffaa00" />
  <text x="160" y="245" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" pointer-events="none">VIP LEFT</text>

  <polygon id="zone-vip-right" class="zone" points="570,190 720,190 680,290 570,290" fill="#ffaa00" />
  <text x="640" y="245" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" pointer-events="none">VIP RIGHT</text>

  <rect id="zone-ga-01" class="zone" x="250" y="190" width="300" height="100" fill="#007bff" rx="8" />
  <text x="400" y="245" fill="#ffffff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" pointer-events="none">STANDARD (GA)</text>
</svg>
